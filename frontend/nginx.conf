server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                always;
    add_header X-Content-Type-Options   "nosniff"                   always;
    add_header X-XSS-Protection         "1; mode=block"             always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline'; \
         style-src 'self' 'unsafe-inline'; \
         img-src 'self' data: https:; \
         connect-src 'self'; \
         font-src 'self'; \
         frame-ancestors 'none'; \
         object-src 'none'; \
         base-uri 'self';"
        always;
    # Uncomment only after HTTPS is confirmed working — once set, browsers enforce
    # HTTPS for the domain for max-age seconds. Setting it on HTTP bricks the site.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── API reverse proxy ──────────────────────────────────────────────────────
    # Forwards /api/* to FastAPI preserving the full path (routes are /api/v1/...).
    # Do NOT add a trailing slash to proxy_pass — that would strip /api from the URI.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 130s;   # slightly above VERIFICATION_TIMEOUT_SECONDS (120)
        proxy_send_timeout 130s;
    }

    # ── Static asset caching ───────────────────────────────────────────────────
    # Vite production builds include a content hash in filenames, so these assets
    # are safe to cache indefinitely.
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-apply security headers since add_header in a sub-block clears parent headers.
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── SPA fallback ───────────────────────────────────────────────────────────
    # All non-file, non-API paths are handled by the React router.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
