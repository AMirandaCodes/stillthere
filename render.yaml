services:
  # ── React Frontend (Static Site) ──────────────────────────────────────────
  - type: web
    name: stillthere-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # Set VITE_API_BASE_URL in the Render dashboard after you know the backend URL.
    # Value: https://stillthere-backend.onrender.com/api
    # This is a build-time variable — Vite bakes it into the JS bundle.
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

  # ── FastAPI Backend (Web Service) ─────────────────────────────────────────
  - type: web
    name: stillthere-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1 --log-level warning
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stillthere-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      # Upstash connection string with /1 suffix (separate DB index from broker)
      - key: CELERY_RESULT_BACKEND
        sync: false
      # Auto-generated by Render. Copy this value into the worker service.
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      # JSON array: '["https://stillthere-frontend.onrender.com"]'
      - key: CORS_ORIGINS
        sync: false
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"

  # ── Celery Worker (Background Worker) ─────────────────────────────────────
  - type: worker
    name: stillthere-worker
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.tasks.celery_app worker --loglevel=warning --concurrency=2 -Q celery,batch
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stillthere-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"

databases:
  - name: stillthere-db
    databaseName: contact_verification
    user: cvp_user
    plan: free
