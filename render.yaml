services:
  # ── React Frontend (Static Site) ──────────────────────────────────────────
  - type: web
    name: stillthere-frontend
    env: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # Set VITE_API_BASE_URL in the Render dashboard after you know the backend URL.
    # Value: https://stillthere-backend.onrender.com/api
    # This is a build-time variable — Vite bakes it into the JS bundle.
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

  # ── FastAPI Backend (Web Service) ─────────────────────────────────────────
  - type: web
    name: stillthere-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    # Render injects $PORT (default 10000). The app must listen on this port.
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1 --log-level warning
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      # Paste the Internal Database URL from Render PostgreSQL dashboard.
      # The postgres:// prefix is normalised to postgresql+asyncpg:// by config.py.
      - key: DATABASE_URL
        sync: false
      # Upstash Redis connection strings
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      # Use database index /1 to separate the result backend from the broker
      - key: CELERY_RESULT_BACKEND
        sync: false
      # Auto-generated by Render. Copy this value into the worker service manually.
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      # JSON array: '["https://stillthere-frontend.onrender.com"]'
      - key: CORS_ORIGINS
        sync: false
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"

  # ── Celery Worker (Background Worker) ─────────────────────────────────────
  - type: worker
    name: stillthere-worker
    env: docker
    dockerfilePath: backend/Dockerfile
    startCommand: celery -A app.tasks.celery_app worker --loglevel=warning --concurrency=2 -Q celery,batch
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      # Must match the backend SECRET_KEY exactly. Copy after backend is deployed.
      - key: SECRET_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"

databases:
  - name: stillthere-db
    databaseName: contact_verification
    user: cvp_user
    plan: free
